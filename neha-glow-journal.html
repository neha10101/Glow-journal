<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Glow Journal" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#c77dbd" />
  <title>Neha's Glow Journal ✨</title>

  <!-- PWA icons via SVG data URI -->
  <link rel="apple-touch-icon" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxODAgMTgwIj48cmVjdCB3aWR0aD0iMTgwIiBoZWlnaHQ9IjE4MCIgcng9IjM2IiBmaWxsPSJ1cmwoI2cpIi8+PGRlZnM+PGxpbmVhckdyYWRpZW50IGlkPSJnIiB4MT0iMCUiIHkxPSIwJSIgeDI9IjEwMCUiIHkyPSIxMDAlIj48c3RvcCBvZmZzZXQ9IjAlIiBzdG9wLWNvbG9yPSIjZThhMGJmIi8+PHN0b3Agb2Zmc2V0PSIxMDAlIiBzdG9wLWNvbG9yPSIjOWI1ZWEyIi8+PC9saW5lYXJHcmFkaWVudD48L2RlZnM+PHRleHQgeD0iOTAiIHk9IjExNSIgZm9udC1zaXplPSI4MCIgdGV4dC1hbmNob3I9Im1pZGRsZSI+8J+MuDwvdGV4dD48L3N2Zz4=" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    :root {
      --pink: #e8a0bf;
      --purple: #c77dbd;
      --deep: #9b5ea2;
      --text: #3a2a35;
      --soft: #7a3b6e;
      --bg: #fff5f7;
      --card: #ffffff;
      --muted: #b080a0;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: linear-gradient(145deg, #fff5f7 0%, #fce8f3 50%, #ece4f8 100%);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* HEADER */
    .header {
      background: linear-gradient(120deg, #e8a0bf 0%, #c77dbd 60%, #9b5ea2 100%);
      padding: calc(16px + var(--safe-top)) 20px 20px;
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
    }
    .header::before {
      content: '';
      position: absolute;
      top: -30px; right: -30px;
      width: 120px; height: 120px;
      border-radius: 50%;
      background: rgba(255,255,255,0.12);
    }
    .header::after {
      content: '';
      position: absolute;
      bottom: -15px; left: -20px;
      width: 80px; height: 80px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
    }
    .header-sub { font-size: 11px; color: rgba(255,255,255,0.75); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 3px; }
    .header-title { font-family: 'Playfair Display', serif; font-size: 24px; color: #fff; font-weight: 700; }
    .header-date { font-size: 12px; color: rgba(255,255,255,0.7); margin-top: 2px; }

    .progress-bar-wrap { margin-top: 14px; }
    .progress-label { display: flex; justify-content: space-between; font-size: 11px; color: rgba(255,255,255,0.8); margin-bottom: 5px; }
    .progress-track { background: rgba(255,255,255,0.25); border-radius: 20px; height: 7px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 20px; background: linear-gradient(90deg, rgba(255,255,255,0.6), #fff); transition: width 0.6s cubic-bezier(.4,0,.2,1); }
    .progress-sub { font-size: 10px; color: rgba(255,255,255,0.6); margin-top: 4px; }

    /* STREAKS */
    .streaks { display: flex; gap: 8px; padding: 12px 16px; flex-shrink: 0; }
    .streak-card {
      flex: 1; background: var(--card); border-radius: 14px; padding: 9px 6px;
      text-align: center; box-shadow: 0 2px 10px rgba(160,80,140,0.1);
      border: 1.5px solid #f0e0f0;
    }
    .streak-num { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700; color: var(--deep); }
    .streak-label { font-size: 9px; color: var(--muted); margin-top: 1px; }

    /* TABS */
    .tabs { display: flex; gap: 6px; padding: 0 16px 10px; flex-shrink: 0; }
    .tab-btn {
      flex: 1; padding: 9px 0; border-radius: 12px; border: none; font-size: 12px;
      font-family: 'DM Sans', sans-serif; font-weight: 500; cursor: pointer;
      transition: all 0.2s;
    }
    .tab-btn.active {
      background: linear-gradient(120deg, #e8a0bf, #c77dbd);
      color: #fff; box-shadow: 0 4px 14px rgba(160,80,140,0.3);
    }
    .tab-btn.inactive { background: var(--card); color: var(--deep); box-shadow: 0 2px 8px rgba(0,0,0,0.06); }

    /* SCROLL CONTENT */
    .content { flex: 1; overflow-y: auto; padding: 0 16px calc(20px + var(--safe-bottom)); -webkit-overflow-scrolling: touch; }
    .content::-webkit-scrollbar { display: none; }

    /* ROUTINE CARD */
    .routine-card {
      background: var(--card); border-radius: 18px; padding: 16px;
      margin-bottom: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.07);
      border: 1.5px solid #f5ecf5;
      animation: fadeUp 0.4s ease both;
    }
    .routine-card.done { border-color: #e8a0bf; box-shadow: 0 4px 18px rgba(180,100,160,0.15); }
    @keyframes fadeUp {
      from { transform: translateY(16px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .routine-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .routine-title-row { display: flex; align-items: center; gap: 8px; }
    .routine-emoji { font-size: 20px; }
    .routine-name { font-family: 'Playfair Display', serif; font-size: 15px; font-weight: 700; color: #5a2d5a; }
    .routine-time { font-size: 10px; color: var(--muted); }
    .routine-badge {
      border-radius: 20px; padding: 3px 10px; font-size: 11px; font-weight: 600;
      background: #f5ecf5; color: var(--muted);
    }
    .routine-badge.done { background: linear-gradient(120deg, #e8a0bf, #c77dbd); color: #fff; }

    /* STEPS */
    .step-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 10px; border-radius: 11px; margin-bottom: 6px;
      cursor: pointer; transition: all 0.18s ease;
      background: #fafafa; border: 1px solid #f0ece8;
      -webkit-user-select: none; user-select: none;
    }
    .step-item.checked { background: linear-gradient(90deg, #fce8f3, #f5ecf5); border-color: #f0c8e4; }
    .step-item:active { transform: scale(0.98); }
    .check-circle {
      width: 20px; height: 20px; border-radius: 50%; flex-shrink: 0;
      background: #fff; border: 2px solid #ddc0d8;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.22s cubic-bezier(.4,0,.2,1);
    }
    .check-circle.checked {
      background: linear-gradient(135deg, #e8a0bf, #c77dbd);
      border: none; box-shadow: 0 2px 8px rgba(180,100,160,0.35);
    }
    .check-icon { color: #fff; font-size: 11px; display: none; }
    .check-circle.checked .check-icon { display: block; }
    .step-text { font-size: 12px; color: #5a4055; }
    .step-text.checked { text-decoration: line-through; color: var(--soft); opacity: 0.65; }

    /* NOTIFICATION TOAST */
    .toast {
      position: fixed; top: calc(16px + var(--safe-top)); left: 50%; transform: translateX(-50%);
      background: #fff; border-radius: 16px; padding: 12px 20px;
      box-shadow: 0 8px 30px rgba(180,100,160,0.2); z-index: 999;
      font-size: 13px; color: var(--soft); max-width: 320px; text-align: center;
      border: 1.5px solid #f0c0e0; font-weight: 500;
      animation: toastIn 0.35s ease;
      pointer-events: none;
    }
    @keyframes toastIn {
      from { transform: translateX(-50%) translateY(-50px); opacity: 0; }
      to { transform: translateX(-50%) translateY(0); opacity: 1; }
    }
    .toast.hide { animation: toastOut 0.3s ease forwards; }
    @keyframes toastOut {
      to { transform: translateX(-50%) translateY(-50px); opacity: 0; }
    }

    /* CONFETTI */
    .confetti-piece {
      position: fixed; top: -12px; width: 10px; height: 10px;
      border-radius: 2px; pointer-events: none; z-index: 9999;
      animation: confettiFall 2s ease-in forwards;
    }
    @keyframes confettiFall {
      0% { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }

    /* WEEKLY GRID */
    .week-grid { display: flex; gap: 5px; justify-content: space-between; }
    .day-col { flex: 1; text-align: center; }
    .day-letter { font-size: 9px; color: var(--muted); margin-bottom: 4px; font-weight: 500; }
    .day-letter.today { color: var(--deep); font-weight: 700; }
    .day-dot {
      aspect-ratio: 1; border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; color: #ccc;
    }
    .day-sub { font-size: 8px; color: #c0a0b8; margin-top: 3px; }

    .legend { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; justify-content: center; }
    .legend-item { display: flex; align-items: center; gap: 4px; font-size: 10px; color: var(--muted); }
    .legend-dot { width: 11px; height: 11px; border-radius: 3px; }

    /* REMINDER ROWS */
    .reminder-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 0; border-bottom: 1px solid #f5ecf5;
    }
    .reminder-label { font-size: 13px; color: #5a4055; }
    .reminder-badge {
      background: #fce8f3; color: var(--deep); border-radius: 8px;
      padding: 4px 10px; font-size: 11px; font-weight: 600;
    }

    /* TIPS */
    .tip-row { display: flex; gap: 8px; align-items: flex-start; padding: 5px 0; }
    .tip-bullet { color: var(--purple); font-size: 11px; margin-top: 2px; flex-shrink: 0; }
    .tip-text { font-size: 12px; color: #5a4055; }

    /* INSTALL BANNER */
    .install-banner {
      background: linear-gradient(120deg, #fce8f3, #ece4f8);
      border: 1.5px solid #e8d0f0; border-radius: 16px;
      padding: 14px 16px; margin-bottom: 14px;
      display: flex; align-items: center; gap: 12px;
    }
    .install-icon { font-size: 26px; flex-shrink: 0; }
    .install-text h4 { font-family: 'Playfair Display', serif; font-size: 14px; color: #5a2d5a; margin-bottom: 3px; }
    .install-text p { font-size: 11px; color: var(--muted); line-height: 1.5; }
    .install-close {
      margin-left: auto; background: none; border: none; cursor: pointer;
      font-size: 18px; color: var(--muted); flex-shrink: 0; padding: 0 4px;
    }

    .section-title {
      font-family: 'Playfair Display', serif; font-size: 15px; color: #5a2d5a; margin-bottom: 12px;
    }
  </style>
</head>
<body>

<div id="toast" class="toast" style="display:none"></div>
<div id="confetti-container"></div>

<!-- HEADER -->
<div class="header">
  <div class="header-sub">Neha's</div>
  <div class="header-title">Glow Journal ✨</div>
  <div class="header-date" id="header-date"></div>
  <div class="progress-bar-wrap">
    <div class="progress-label">
      <span>Today's Progress</span>
      <span id="progress-pct">0%</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>
    <div class="progress-sub" id="progress-sub">0 of 0 steps done</div>
  </div>
</div>

<!-- STREAKS -->
<div class="streaks">
  <div class="streak-card">
    <div class="streak-num" id="streak-morning">0🔥</div>
    <div class="streak-label">☀️ Morning</div>
  </div>
  <div class="streak-card">
    <div class="streak-num" id="streak-night">0🔥</div>
    <div class="streak-label">🌙 Night</div>
  </div>
  <div class="streak-card">
    <div class="streak-num" id="streak-body">0🔥</div>
    <div class="streak-label">🚿 Body</div>
  </div>
</div>

<!-- TABS -->
<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('today', this)">Today</button>
  <button class="tab-btn inactive" onclick="switchTab('weekly', this)">Weekly</button>
  <button class="tab-btn inactive" onclick="switchTab('extra', this)">Extra Care</button>
</div>

<!-- CONTENT -->
<div class="content" id="content"></div>

<script>
const ROUTINES = {
  morning: {
    label: "Morning Face", emoji: "🌅", time: "8:00 AM",
    steps: [
      { id: "m1", text: "Wash face with Plum Cleanser" },
      { id: "m2", text: "Apply Niacinamide Serum (2–3 drops)" },
      { id: "m3", text: "Apply Pond's Moisturizer" },
      { id: "m4", text: "Apply Minimalist Sunscreen (last step before going outside)" },
    ]
  },
  night: {
    label: "Night Face", emoji: "🌙", time: "9:00 PM",
    steps: [
      { id: "n1", text: "Wash face with Plum Cleanser" },
      { id: "n2", text: "Apply Niacinamide Serum" },
      { id: "n3", text: "Apply Pond's Moisturizer" },
    ]
  },
  body: {
    label: "Body (Daily)", emoji: "🚿", time: "8:30 AM",
    steps: [
      { id: "b1", text: "Shower normally" },
      { id: "b2", text: "Use Minimalist Salicylic Acid Body Wash on arms & legs (leave 1 min)" },
      { id: "b3", text: "Apply body moisturizer after shower" },
    ]
  },
  exfoliation: {
    label: "Exfoliation", emoji: "✨", freq: "2× per week",
    steps: [
      { id: "e1", text: "Mix 1 tbsp sugar + 1 tsp coconut oil" },
      { id: "e2", text: "Gently scrub arms & legs for ~30 seconds" },
      { id: "e3", text: "Rinse and apply moisturizer" },
    ]
  },
  mask: {
    label: "Multani Mitti Mask", emoji: "🧖‍♀️", freq: "1× per week",
    steps: [
      { id: "k1", text: "Mix Multani Mitti with water or rose water" },
      { id: "k2", text: "Apply on arms & legs for 10–15 minutes" },
      { id: "k3", text: "Wash off and moisturize" },
    ]
  },
  shaving: {
    label: "Shaving Tips", emoji: "🪒", freq: "As needed",
    steps: [
      { id: "s1", text: "Shave after shower when skin is soft" },
      { id: "s2", text: "Use conditioner or shaving gel" },
      { id: "s3", text: "Use a sharp razor" },
      { id: "s4", text: "Shave in the direction of hair growth" },
      { id: "s5", text: "Moisturize after shaving" },
    ]
  }
};

const QUOTES = [
  "Glowing skin is always in! 💫",
  "Consistency is your best ingredient 🌿",
  "One step closer to your glow! ✨",
  "Soft skin, soft life 🌸",
  "Small steps = big results! 🌟"
];

function getTodayKey() {
  return new Date().toISOString().split("T")[0];
}

function getWeekDays() {
  const days = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    days.push(d.toISOString().split("T")[0]);
  }
  return days;
}

const todayKey = getTodayKey();
let checked = JSON.parse(localStorage.getItem("glow_" + todayKey) || "{}");
let history = JSON.parse(localStorage.getItem("glow_history") || "{}");
let showInstall = !localStorage.getItem("glow_install_dismissed");
let activeTab = "today";

// Reset checked at midnight
const lastSave = localStorage.getItem("glow_last_date");
if (lastSave && lastSave !== todayKey) {
  checked = {};
}
localStorage.setItem("glow_last_date", todayKey);

function save() {
  localStorage.setItem("glow_" + todayKey, JSON.stringify(checked));
  history[todayKey] = checked;
  localStorage.setItem("glow_history", JSON.stringify(history));
}

function getAllSteps(tabKeys) {
  return tabKeys.flatMap(k => ROUTINES[k].steps);
}

const todayKeys = ["morning", "night", "body"];
const totalSteps = getAllSteps(todayKeys).length;

function getDoneCount() {
  return getAllSteps(todayKeys).filter(s => checked[s.id]).length;
}

function updateProgress() {
  const done = getDoneCount();
  const pct = Math.round((done / totalSteps) * 100);
  document.getElementById("progress-fill").style.width = pct + "%";
  document.getElementById("progress-pct").textContent = pct + "%";
  document.getElementById("progress-sub").textContent = done + " of " + totalSteps + " steps done";
}

function calcStreak(routineKey) {
  const days = getWeekDays();
  let streak = 0;
  for (let i = days.length - 1; i >= 0; i--) {
    const dayData = history[days[i]] || {};
    const allDone = ROUTINES[routineKey].steps.every(s => dayData[s.id]);
    if (allDone) streak++;
    else if (i < days.length - 1) break;
  }
  return streak;
}

function updateStreaks() {
  document.getElementById("streak-morning").textContent = calcStreak("morning") + "🔥";
  document.getElementById("streak-night").textContent = calcStreak("night") + "🔥";
  document.getElementById("streak-body").textContent = calcStreak("body") + "🔥";
}

function toggleStep(stepId, routineKey) {
  checked[stepId] = !checked[stepId];
  save();

  const el = document.getElementById("step-" + stepId);
  const circle = el.querySelector(".check-circle");
  const textEl = el.querySelector(".step-text");
  if (checked[stepId]) {
    el.classList.add("checked");
    circle.classList.add("checked");
    textEl.classList.add("checked");
  } else {
    el.classList.remove("checked");
    circle.classList.remove("checked");
    textEl.classList.remove("checked");
  }

  // Update badge
  const routine = ROUTINES[routineKey];
  const doneCount = routine.steps.filter(s => checked[s.id]).length;
  const badge = document.getElementById("badge-" + routineKey);
  if (badge) {
    badge.textContent = doneCount + "/" + routine.steps.length;
    badge.className = "routine-badge" + (doneCount === routine.steps.length ? " done" : "");
  }
  const card = document.getElementById("card-" + routineKey);
  if (card) {
    if (doneCount === routine.steps.length) card.classList.add("done");
    else card.classList.remove("done");
  }

  // Complete effect
  const prevDone = routine.steps.filter((s, i) => i < routine.steps.length - 1 && checked[s.id]).length;
  if (doneCount === routine.steps.length && checked[stepId]) {
    triggerComplete(routineKey);
  }

  updateProgress();
  updateStreaks();
}

let toastTimeout;
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.style.display = "block";
  t.classList.remove("hide");
  clearTimeout(toastTimeout);
  toastTimeout = setTimeout(() => {
    t.classList.add("hide");
    setTimeout(() => t.style.display = "none", 300);
  }, 3000);
}

function triggerComplete(routineKey) {
  const quote = QUOTES[Math.floor(Math.random() * QUOTES.length)];
  showToast(ROUTINES[routineKey].label + " complete! " + quote);
  spawnConfetti();
}

function spawnConfetti() {
  const colors = ["#f9c6d0", "#b5ead7", "#ffd6a5", "#c7ceea", "#ffe4e1", "#e8a0bf"];
  const container = document.getElementById("confetti-container");
  container.innerHTML = "";
  for (let i = 0; i < 20; i++) {
    const p = document.createElement("div");
    p.className = "confetti-piece";
    p.style.left = Math.random() * 100 + "%";
    p.style.background = colors[Math.floor(Math.random() * colors.length)];
    p.style.animationDelay = (Math.random() * 0.5) + "s";
    p.style.borderRadius = Math.random() > 0.5 ? "50%" : "2px";
    container.appendChild(p);
  }
  setTimeout(() => container.innerHTML = "", 2500);
}

function buildRoutineCard(key, delay) {
  const r = ROUTINES[key];
  const doneCount = r.steps.filter(s => checked[s.id]).length;
  const allDone = doneCount === r.steps.length;

  const stepsHTML = r.steps.map(step => `
    <div class="step-item${checked[step.id] ? " checked" : ""}" id="step-${step.id}" onclick="toggleStep('${step.id}','${key}')">
      <div class="check-circle${checked[step.id] ? " checked" : ""}">
        <span class="check-icon">✓</span>
      </div>
      <span class="step-text${checked[step.id] ? " checked" : ""}">${step.text}</span>
    </div>
  `).join("");

  return `
    <div class="routine-card${allDone ? " done" : ""}" id="card-${key}" style="animation-delay:${delay}s">
      <div class="routine-header">
        <div class="routine-title-row">
          <span class="routine-emoji">${r.emoji}</span>
          <div>
            <div class="routine-name">${r.label}</div>
            <div class="routine-time">${r.time ? "⏰ " + r.time : "📅 " + (r.freq || "")}</div>
          </div>
        </div>
        <div class="routine-badge${allDone ? " done" : ""}" id="badge-${key}">${doneCount}/${r.steps.length}</div>
      </div>
      ${stepsHTML}
    </div>
  `;
}

function buildWeekly() {
  const days = getWeekDays();
  const dayNames = ["S","M","T","W","T","F","S"];

  const cols = days.map(day => {
    const dayData = history[day] || {};
    const isToday = day === todayKey;
    const d = new Date(day + "T12:00:00");
    const letter = dayNames[d.getDay()];
    const m = d.getDate();
    const mDone = ROUTINES.morning.steps.every(s => dayData[s.id]);
    const nDone = ROUTINES.night.steps.every(s => dayData[s.id]);
    const bDone = ROUTINES.body.steps.every(s => dayData[s.id]);
    const score = [mDone, nDone, bDone].filter(Boolean).length;
    const bg = score === 3 ? "linear-gradient(135deg,#e8a0bf,#c77dbd)"
              : score === 2 ? "#f0c0e0"
              : score === 1 ? "#f8dced"
              : "#f5ecf5";
    const content = score === 3 ? "✨" : score > 0 ? score : m;
    const color = score > 0 ? "#7a3b6e" : "#ccc";
    return `
      <div class="day-col">
        <div class="day-letter${isToday ? " today" : ""}">${letter}</div>
        <div class="day-dot" style="background:${bg};color:${color};border:${isToday ? "2px solid #c77dbd" : "none"};box-shadow:${isToday ? "0 2px 8px rgba(180,100,160,0.25)" : "none"}">${content}</div>
        <div class="day-sub">${score}/3</div>
      </div>`;
  }).join("");

  return `
    <div class="routine-card" style="animation-delay:0s">
      <div class="section-title">7-Day Overview</div>
      <div class="week-grid">${cols}</div>
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:linear-gradient(135deg,#e8a0bf,#c77dbd)"></div> All done</div>
        <div class="legend-item"><div class="legend-dot" style="background:#f0c0e0"></div> 2/3</div>
        <div class="legend-item"><div class="legend-dot" style="background:#f8dced"></div> 1/3</div>
        <div class="legend-item"><div class="legend-dot" style="background:#f5ecf5"></div> None</div>
      </div>
    </div>
    <div class="routine-card" style="animation-delay:0.1s">
      <div class="section-title">⏰ Reminder Times</div>
      <div class="reminder-row"><span class="reminder-label">🌅 Morning Routine</span><span class="reminder-badge">8:00 AM</span></div>
      <div class="reminder-row"><span class="reminder-label">🚿 Body Routine</span><span class="reminder-badge">8:30 AM</span></div>
      <div class="reminder-row" style="border:none"><span class="reminder-label">🌙 Night Routine</span><span class="reminder-badge">9:00 PM</span></div>
      <p style="font-size:11px;color:var(--muted);margin-top:12px;text-align:center">💡 Set these as phone alarms for best results!</p>
    </div>
  `;
}

function buildExtra() {
  const installBanner = showInstall ? `
    <div class="install-banner">
      <div class="install-icon">📲</div>
      <div class="install-text">
        <h4>Add to Home Screen</h4>
        <p>On iPhone: tap Share → "Add to Home Screen"<br>On Android: tap Menu → "Add to Home screen"</p>
      </div>
      <button class="install-close" onclick="dismissInstall()">×</button>
    </div>
  ` : "";

  const cards = ["exfoliation", "mask", "shaving"].map((k, i) => buildRoutineCard(k, i * 0.1)).join("");

  const tips = [
    "Consistency with salicylic acid body wash is key — give it 4–6 weeks",
    "Don't skip moisturizer, even if skin feels oily",
    "Wear SPF on exposed arms when going out",
    "Avoid tight synthetic clothing that traps sweat",
    "Stay hydrated — 8 glasses of water daily helps skin!",
  ].map(t => `<div class="tip-row"><span class="tip-bullet">✦</span><span class="tip-text">${t}</span></div>`).join("");

  return installBanner + cards + `
    <div class="routine-card" style="background:linear-gradient(135deg,#fce8f3,#ece4f8);border-color:#e8d0f0;animation-delay:0.3s">
      <div class="section-title">🍓 Strawberry Skin Tips</div>
      ${tips}
    </div>
  `;
}

function dismissInstall() {
  localStorage.setItem("glow_install_dismissed", "1");
  showInstall = false;
  renderContent();
}

function renderContent() {
  const c = document.getElementById("content");
  if (activeTab === "today") {
    c.innerHTML = todayKeys.map((k, i) => buildRoutineCard(k, i * 0.1)).join("");
  } else if (activeTab === "weekly") {
    c.innerHTML = buildWeekly();
  } else {
    c.innerHTML = buildExtra();
  }
  updateProgress();
  updateStreaks();
}

function switchTab(tab, btn) {
  activeTab = tab;
  document.querySelectorAll(".tab-btn").forEach(b => {
    b.classList.remove("active");
    b.classList.add("inactive");
  });
  btn.classList.remove("inactive");
  btn.classList.add("active");
  renderContent();
}

// Header date
const now = new Date();
document.getElementById("header-date").textContent = now.toLocaleDateString("en-IN", {
  weekday: "long", day: "numeric", month: "long"
});

// Init
renderContent();

// Service Worker for offline support
if ("serviceWorker" in navigator) {
  const swCode = `
    const CACHE = 'glow-v1';
    self.addEventListener('install', e => {
      e.waitUntil(caches.open(CACHE).then(c => c.addAll(['/'])));
    });
    self.addEventListener('fetch', e => {
      e.respondWith(caches.match(e.request).then(r => r || fetch(e.request)));
    });
  `;
  const blob = new Blob([swCode], { type: "application/javascript" });
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).catch(() => {});
}
</script>
</body>
</html>
